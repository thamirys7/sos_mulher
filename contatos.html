<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOS Mulher - Contatos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a href="index.html">Voltar ao Manual</a>
  </header>

  <div class="contacts-container">
    <img src="imagens/logo.png" width="150" alt="Logo do site">
    <h2>Contatos de Emergência</h2>
    <p>Gerencie as pessoas que serão notificadas em caso de emergência.</p>

    <div class="warning">
      Recomendamos cadastrar pelo menos 3 contatos de emergência para garantir que você receba ajuda quando precisar.
    </div>

    <div class="contacts-grid">
      <div class="form">
        <h3>Adicionar Contato</h3>
        <form>
          <input type="text" placeholder="Nome Completo">
          <input type="email" placeholder="E-mail">
          <input type="tel" placeholder="Telefone">
          <button type="submit">Adicionar</button>
        </form>
      </div>
      <div class="list">
        <h3>Meus Contatos (0)</h3>
        <p>Nenhum contato cadastrado ainda.</p>
      </div>
    </div>
  </div>
</body>
</html>
